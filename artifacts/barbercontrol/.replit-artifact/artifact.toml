kind = "web"
previewPath = "/"
title = "BarberControl"
version = "1.0.0"
id = "artifacts/barbercontrol"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18929

[services.development]
run = "pnpm --filter @workspace/barbercontrol run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/barbercontrol", "run", "build" ]
publicDir = "artifacts/barbercontrol/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18929"
BASE_PATH = "/"
